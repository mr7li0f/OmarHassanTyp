<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="0; url=./public/index.html" />
  <script>
    (function () {
      var target = './public/index.html';
      var query = window.location.search || '';
      var hash = window.location.hash || '';
      window.location.replace(target + query + hash);
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b0b0b;
      color: #f2f2f2;
      font-family: serif;
    }
    p {
      opacity: 0.9;
      font-size: 14px;
    }
    a {
      color: #f2f2f2;
    }
  </style>
</head>
<body>
  <p>Redirecting to site... If it does not open, click <a href="./public/index.html">here</a>.</p>
</body>
</html>
