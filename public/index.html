<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Omar Hassan Type loading page." />
  <meta name="robots" content="noindex,follow" />
  <meta name="author" content="Omar Hassan" />
  <meta property="og:site_name" content="Omar Hassan Type" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Omar Hassan Type" />
  <meta property="og:description" content="Arabic type portfolio by Omar Hassan." />
  <meta property="og:image" content="./logo.jpeg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Omar Hassan Type" />
  <meta name="twitter:description" content="Arabic type portfolio by Omar Hassan." />
  <meta name="twitter:image" content="./logo.jpeg" />
  <meta name="theme-color" content="#f3eee3" />
  <title>عمر حسن | Loading</title>
  <link rel="canonical" href="./home.html?lang=ar" />
  <link rel="stylesheet" href="./style.css?v=20260418.8" />
  <style>
    html, body {
      min-height: 100%;
      overflow: hidden;
    }

    body[data-page="loading"] #splash {
      min-height: 100dvh;
      width: 100vw;
    }

    .loading-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: min(520px, 90vw);
    }

    .loading-progress {
      position: relative;
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.18);
      overflow: hidden;
      box-shadow: inset 0 0 12px rgba(0,0,0,0.48);
    }

    .loading-progress-bar {
      display: block;
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 34%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0.88), rgba(212,212,212,0.9));
      animation: loadingBar 1.6s linear infinite;
      box-shadow: 0 0 12px rgba(255,255,255,0.32);
      will-change: transform;
    }

    @keyframes loadingBar {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
  </style>
  <link rel="icon" href="./logo.jpeg">
</head>
<body data-page="loading">
  <div id="splash">
    <div class="splash-aurora" aria-hidden="true"></div>
    <div class="splash-logo-shell">
      <img id="splash-logo" src="./logo.jpeg" alt="عمر حسن" />
      <div class="splash-orbit-ring" aria-hidden="true"></div>
      <div class="splash-orbit-dot" aria-hidden="true"></div>
    </div>
    <div class="splash-name">عمر حسن</div>
    <div class="loading-meta">
      <div class="splash-sub" id="loading-sub">Type Designer</div>
      <div class="loading-progress" aria-hidden="true">
        <span class="loading-progress-bar"></span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const labels = {
        ar: { title: 'عمر حسن | Loading', name: 'عمر حسن', sub: 'جاري تجهيز مكتبة الخطوط...' },
        ku: { title: 'عومەر حەسەن | Loading', name: 'عومەر حەسەن', sub: 'ئامادەکردنی کتێبخانەی فۆنت...' },
        en: { title: 'Omar Hassan | Loading', name: 'Omar Hassan', sub: 'Preparing type library...' }
      };

      const pickLang = () => {
        const qsLang = String(new URLSearchParams(window.location.search).get('lang') || '').toLowerCase();
        const saved = (localStorage.getItem('oh_site_lang') || '').toLowerCase();
        const detect = (value) => {
          if (value.startsWith('ar')) return 'ar';
          if (value.startsWith('ku') || value.startsWith('ckb') || value.startsWith('kur')) return 'ku';
          if (value.startsWith('en')) return 'en';
          return '';
        };
        const byQuery = detect(qsLang);
        if (byQuery) return byQuery;
        const bySaved = detect(saved);
        if (bySaved) return bySaved;
        const browser = (navigator.languages && navigator.languages[0]) || navigator.language || 'ar';
        return detect(String(browser).toLowerCase()) || 'ar';
      };

      const lang = pickLang();
      document.documentElement.lang = lang === 'ku' ? 'ku' : lang;
      document.documentElement.dir = (lang === 'en') ? 'ltr' : 'rtl';

      const currentLabel = labels[lang] || labels.ar;
      const splashName = document.querySelector('.splash-name');
      const splashLogo = document.getElementById('splash-logo');
      const sub = document.getElementById('loading-sub');
      document.title = currentLabel.title;
      if (splashName) splashName.textContent = currentLabel.name;
      if (splashLogo) splashLogo.alt = currentLabel.name;
      if (sub) sub.textContent = currentLabel.sub;

      setTimeout(() => {
        window.location.replace(`./home.html?v=20260418.8&lang=${encodeURIComponent(lang)}`);
      }, 2600);
    })();
  </script>
</body>
